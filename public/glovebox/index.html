<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glovebox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var stored = localStorage.getItem("glovebox-theme");
      if (stored === "light" || stored === "dark") {
        document.documentElement.setAttribute("data-theme", stored);
      }
    })();
  </script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-left">
        <button
          type="button"
          id="nav-toggle"
          class="chip icon-button nav-toggle"
          aria-label="Open menu"
          aria-expanded="false"
          aria-controls="side-nav"
        >
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
        <a href="#/log" class="wordmark">Glovebox</a>
      </div>

      <div class="account header-controls">
        <button
          type="button"
          id="theme-toggle"
          class="chip icon-button"
          role="switch"
          aria-checked="false"
          aria-label="Switch to dark mode"
        >
          <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 1020.354 15.354z"/></svg>
        </button>

        <button
          type="button"
          id="units-toggle"
          class="chip units-chip"
          role="switch"
          aria-checked="false"
          aria-label="Switch to kilometers and liters"
        >MI</button>

        <button
          type="button"
          id="account-chip"
          class="chip"
          aria-haspopup="true"
          aria-expanded="false"
          aria-label="Show logged-in account"
          hidden
        ></button>
        <div id="account-popover" class="popover" role="tooltip" hidden></div>
      </div>
    </header>

    <div class="app-body">
      <nav class="side-nav" id="side-nav" aria-label="Sections">
        <a href="#/log" class="nav-item" data-route="#/log">Fuel &amp; Charging</a>
        <a href="#/maintenance" class="nav-item" data-route="#/maintenance">Maintenance</a>
        <a href="#/insurance" class="nav-item" data-route="#/insurance">Insurance</a>
        <a href="#/vehicle" class="nav-item nav-item-vehicle" data-route="#/vehicle">
          <span>Vehicle Information</span>
          <span class="nav-subtext" id="nav-vehicle-name" hidden></span>
        </a>
      </nav>
      <div class="nav-scrim" id="nav-scrim" hidden></div>

      <main class="app-main">
        <section class="route" id="route-log" data-route="#/log">
          <section class="card dash-card">
            <div class="dash-label" id="dash-label">Average Efficiency</div>
            <div id="dash-value"></div>
            <div id="dash-sub" class="dash-sub"></div>
          </section>

          <div class="segment" role="tablist" aria-label="Log type">
            <button type="button" class="segment-btn active" id="seg-gas" role="tab" aria-selected="true" data-panel="panel-gas">⛽ Gas</button>
            <button type="button" class="segment-btn" id="seg-ev" role="tab" aria-selected="false" data-panel="panel-ev">🔌 Charge</button>
          </div>

          <div class="log-panel" id="panel-gas">

          <section class="card">
            <h2>Log a Fill-up</h2>
            <form id="entry-form">
              <div class="field">
                <label for="date">Date</label>
                <div class="date-field-wrap">
                  <input type="date" id="date" name="date" />
                  <span id="date-display" class="date-display" aria-hidden="true"></span>
                </div>
              </div>

              <div class="field">
                <label for="odometer" id="odometer-label">Odometer (mi)</label>
                <input type="number" id="odometer" name="odometer" min="0" step="1" required inputmode="numeric" />
              </div>

              <div class="field">
                <label for="volume" id="volume-label">Gallons</label>
                <input type="number" id="volume" name="volume" min="0" step="0.001" required inputmode="decimal" />
              </div>

              <div class="field">
                <label for="notes">Notes (optional)</label>
                <textarea id="notes" name="notes" rows="2"></textarea>
              </div>

              <button type="submit">Add Entry</button>
              <p id="form-error" class="error" role="alert" aria-live="polite" hidden></p>
            </form>
          </section>

          <section class="card">
            <h2>History</h2>
            <ul id="history-list" class="history-list">
              <li class="history-empty">Loading...</li>
            </ul>
          </section>

          </div><!-- /panel-gas -->

          <div class="log-panel" id="panel-ev" hidden>
            <section class="card">
              <h2>Log a Charge</h2>
              <form id="charge-form">
                <div class="field">
                  <label for="charge-date">Date</label>
                  <div class="date-field-wrap">
                    <input type="date" id="charge-date" name="date" />
                    <span id="charge-date-display" class="date-display" aria-hidden="true"></span>
                  </div>
                </div>

                <div class="field">
                  <label for="charge-odometer" id="charge-odo-label">Odometer (mi)</label>
                  <input type="number" id="charge-odometer" name="odometer" min="0" step="1" required inputmode="numeric" />
                </div>

                <div class="field">
                  <label for="charge-kwh">kWh delivered</label>
                  <input type="number" id="charge-kwh" name="kwh" min="0" step="0.01" required inputmode="decimal" />
                </div>

                <div class="field">
                  <label for="charge-miles" id="charge-miles-label">Miles added (ChargePoint)</label>
                  <input type="number" id="charge-miles" name="miles_added" min="0" step="1" inputmode="numeric" />
                </div>

                <div class="field">
                  <label for="charge-notes">Notes (optional)</label>
                  <textarea id="charge-notes" name="notes" rows="2"></textarea>
                </div>

                <button type="submit">Add Charge</button>
                <p id="charge-form-error" class="error" role="alert" aria-live="polite" hidden></p>
              </form>
            </section>

            <section class="card">
              <h2>History</h2>
              <ul id="charge-list" class="history-list">
                <li class="history-empty">Loading…</li>
              </ul>
            </section>
          </div><!-- /panel-ev -->
        </section>

        <section class="route" id="route-maintenance" data-route="#/maintenance" hidden>
          <section class="card">
            <div class="card-head">
              <h2>Maintenance</h2>
              <button type="button" id="maint-add-btn" class="btn-secondary">Add service</button>
            </div>
            <div id="maint-form-wrap" hidden></div>
          </section>

          <section class="card">
            <h2>History</h2>
            <ul id="maint-list" class="history-list">
              <li class="history-empty">Loading…</li>
            </ul>
          </section>
        </section>

        <section class="route" id="route-insurance" data-route="#/insurance" hidden>
          <section class="card">
            <div id="insurance-body">
              <p class="placeholder-note">Loading…</p>
            </div>
          </section>
        </section>

        <section class="route" id="route-vehicle" data-route="#/vehicle" hidden>
          <section class="card">
            <p class="placeholder-note">Loading…</p>
          </section>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
